<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Matthix</title>
    <meta name="description" content="Matthix - Plattformen, Netzwerke und Entwicklung mit Charakter.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="life-canvas" class="life-canvas" aria-hidden="true"></canvas>

    <div class="chrome-shell">
        <header class="masthead">
            <a class="brand" href="#home">
                <span class="brand-icon" aria-hidden="true">
                    <svg viewBox="0 0 220 170" role="img">
                        <path d="M35 145 C18 126, 31 74, 64 28 C79 8, 100 11, 97 42 C94 79, 84 117, 96 124 C109 132, 132 89, 172 41 C193 15, 210 8, 203 43 C195 83, 182 126, 166 162"></path>
                    </svg>
                </span>
                <span class="brand-text">MATTHIX</span>
            </a>
        <nav class="site-nav">
            <a data-nav-link href="#home">Startseite</a>
            <a data-nav-link href="#leistung">Leistung</a>
            <a data-nav-link href="#referenzen">Referenzen</a>
            <a data-nav-link href="#kontakt">Kontakt</a>
        </nav>
        <div class="nav-actions">
            <button id="game-toggle" class="icon-toggle" type="button" aria-label="Game of Life Modus">
                <svg class="icon-gamepad" viewBox="0 0 32 32" aria-hidden="true">
                    <path d="M10 12h12c3.8 0 6 2.2 6.8 5.4l1.1 4.5c.5 2.1-.8 4.1-2.9 4.6-1.5.3-3-.2-4-1.4l-2.8-3.1H11.8L9 25.1c-1 1.2-2.5 1.7-4 1.4-2.1-.5-3.4-2.5-2.9-4.6l1.1-4.5C4 14.2 6.2 12 10 12Z"></path>
                    <path d="M12 10.2 13.8 8h4.4L20 10.2"></path>
                    <path d="M9.2 18.2h5.2"></path>
                    <path d="M11.8 15.6v5.2"></path>
                    <path d="M22.5 17.6h.01"></path>
                    <path d="M25.2 20.2h.01"></path>
                </svg>
                <svg class="icon-close" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 6l12 12"></path>
                        <path d="M18 6L6 18"></path>
                    </svg>
            </button>
        </div>
        </header>

        <main id="top" class="site-shell" aria-live="polite"></main>
    </div>

    <section id="game-panel" class="game-panel" aria-live="polite">
        <div class="game-panel-header">
            <p class="game-kicker">Game of Life</p>
            <button id="settings-toggle" class="chevron-toggle" type="button" aria-label="Settings einklappen">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 9l6 6 6-6"></path>
                </svg>
            </button>
        </div>
        <div class="game-controls">
            <section class="settings-panel panel-card" aria-label="Spiel Einstellungen">
                <div class="settings-topline">
                    <label class="control-group control-group-theme">
                        <span>Theme</span>
                        <select id="theme-select">
                            <option value="normal">Normal</option>
                            <option value="orbs">Orb</option>
                            <option value="tron">Tron</option>
                            <option value="simpsons">Simpsons</option>
                            <option value="city">City</option>
                            <option value="trees">Trees</option>
                            <option value="rainbow-road">Rainbow Road</option>
                        </select>
                    </label>
                    <button id="random-seed" class="control-button control-button-seed" type="button">Neu erzeugen</button>
                </div>
                <div class="settings-grid">
                    <label class="control-group control-group-range">
                        <span>Startzellen</span>
                        <input id="seed-threshold" type="range" min="0.55" max="0.95" step="0.01" value="0.76">
                        <strong id="seed-threshold-value">Locker</strong>
                    </label>
                    <label class="control-group control-group-reset">
                        <span>Auto-Reset</span>
                        <input id="auto-reset-generation" type="number" min="10" max="500" step="5" value="120">
                        <strong id="auto-reset-generation-value">120 Generationen</strong>
                    </label>
                </div>
            </section>
            <section class="monitoring-panel panel-card" aria-label="Spiel Monitoring">
                <div class="monitoring-head">
                    <div>
                        <span class="panel-kicker">Monitoring</span>
                    </div>
                    <strong id="graph-label">Living Cells</strong>
                </div>
                <div class="stats-cluster">
                    <div class="stat-chip"><span>Lebende</span><strong id="stat-living">0</strong></div>
                    <div class="stat-chip"><span>Sterbende</span><strong id="stat-dying">0</strong></div>
                    <div class="stat-chip"><span>Generationen</span><strong id="stat-generation">0</strong></div>
                </div>
                <section class="graph-panel" aria-label="Live Graph">
                    <canvas id="living-graph" class="living-graph" width="260" height="92"></canvas>
                    <div class="graph-legend" aria-hidden="true">
                        <span class="legend-item"><i class="legend-swatch legend-swatch-living"></i>Lebend</span>
                        <span class="legend-item"><i class="legend-swatch legend-swatch-dying"></i>Sterbend</span>
                    </div>
                </section>
            </section>
        </div>
    </section>

    <script src="matthix-home.js"></script>
</body>
</html>
