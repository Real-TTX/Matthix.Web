name: Deploy website to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload static files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload files via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          : "${FTP_HOST:?Missing FTP_HOST secret}"
          : "${FTP_USERNAME:?Missing FTP_USERNAME secret}"
          : "${FTP_PASSWORD:?Missing FTP_PASSWORD secret}"
          : "${FTP_REMOTE_DIR:?Missing FTP_REMOTE_DIR secret}"

          if [[ "$FTP_HOST" == *"://"* || "$FTP_HOST" == */* ]]; then
            echo "::error::FTP_HOST must be only the hostname, for example ftp.example.com. Do not include ftp://, a port, or a path."
            exit 1
          fi

          if [[ -n "${FTP_PORT:-}" && ! "$FTP_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::FTP_PORT must be numeric, for example 21."
            exit 1
          fi

          if ! getent hosts "$FTP_HOST" >/dev/null; then
            echo "::error::FTP_HOST does not resolve. Check the hostname in the FTP_HOST repository secret."
            exit 1
          fi

          lftp <<EOF
          set net:timeout 20
          set net:max-retries 2
          set ftp:passive-mode true
          set ssl:verify-certificate no
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_HOST:${FTP_PORT:-21}"
          mirror --reverse --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude README.md \
            ./ "$FTP_REMOTE_DIR"
          bye
          EOF
